services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - engine_data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: ./web/.env.local
    environment:
      # Override ENGINE_URL to use internal Docker network
      ENGINE_URL: http://engine:8000
    depends_on:
      - engine
    restart: unless-stopped

volumes:
  engine_data:
